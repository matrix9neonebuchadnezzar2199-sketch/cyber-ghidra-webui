services:
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - WATCHPACK_POLLING=true
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./app/frontend:/app
      # Windows/mac で作った node_modules を載せない（esbuild 等は OS 別バイナリのため Linux 専用ボリューム）
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./app/backend:/app
      - ./input:/app/input
      - ./output:/app/output
      - ./queue:/app/queue
      - ./scripts/ghidra:/ghidra-scripts
      - ./models:/app/models
    environment:
      - GHIDRA_HOME=/opt/ghidra
      - GHIDRA_TIMEOUT_SEC=600
      - CORS_ORIGINS=http://localhost:3001
      - LLM_API_URL=http://host.docker.internal:11434/v1
      - LLM_MODEL=llama3
      - LLM_TIMEOUT_SEC=120
      - LLM_USE_JSON_MODE=1

  ghidra-worker:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    command: ["/opt/venv/bin/python", "/app/worker.py"]
    network_mode: "none"
    read_only: true
    tmpfs:
      - /tmp:size=2G
      - /root/.config:size=64M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./input:/app/input:ro
      - ./output:/app/output
      - ./queue:/app/queue
      - ./scripts/ghidra:/ghidra-scripts:ro
      - ghidra_worker_projects:/workspace/ghidra_projects
    environment:
      - GHIDRA_HOME=/opt/ghidra
      - GHIDRA_PROJECT_ROOT=/workspace/ghidra_projects
      - GHIDRA_TIMEOUT_SEC=600
      - WORKER_POLL_SEC=2

  ghidra-server:
    image: blacktop/ghidra:latest
    ports:
      - "13100-13102:13100-13102"
    volumes:
      - ./ghidra_data:/repos
    environment:
      - GHIDRA_USERS=magi
      # ヘッドレス環境で GUI 起動を試みるのを抑止（ログの ERROR 軽減）
      - _JAVA_OPTIONS=-Djava.awt.headless=true
    restart: always

volumes:
  ghidra_worker_projects:
  frontend_node_modules:
