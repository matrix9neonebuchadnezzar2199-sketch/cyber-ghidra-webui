services:
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    depends_on:
      - backend

  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    tmpfs:
      - /tmp/extract:size=1G,noexec,nosuid,nodev
    volumes:
      - cyber_input:/app/input
      - ./output:/app/output
      - ./queue:/app/queue
      - ./scripts/ghidra:/ghidra-scripts
      - ./models:/app/models
    environment:
      - GHIDRA_HOME=/opt/ghidra
      - GHIDRA_TIMEOUT_SEC=600
      - CORS_ORIGINS=http://localhost:3001
      - LLM_API_URL=http://host.docker.internal:11434/v1
      - LLM_MODEL=llama3
      - LLM_TIMEOUT_SEC=120
      - LLM_USE_JSON_MODE=1

  ghidra-worker:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    command: ["/opt/venv/bin/python", "/app/worker.py"]
    network_mode: "none"
    read_only: true
    tmpfs:
      - /tmp:size=2G
      - /root/.config:size=64M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - cyber_input:/app/input
      - ./output:/app/output
      - ./queue:/app/queue
      - ./scripts/ghidra:/ghidra-scripts:ro
      - ghidra_worker_projects:/workspace/ghidra_projects
    environment:
      - GHIDRA_HOME=/opt/ghidra
      - GHIDRA_PROJECT_ROOT=/workspace/ghidra_projects
      - GHIDRA_TIMEOUT_SEC=600
      - WORKER_POLL_SEC=2

  ghidra-server:
    image: blacktop/ghidra:latest
    command: server
    ports:
      - "127.0.0.1:13100-13102:13100-13102"
    volumes:
      - ./ghidra_data:/repos
    environment:
      - GHIDRA_USERS=magi
    restart: always

volumes:
  ghidra_worker_projects:
  cyber_input:
